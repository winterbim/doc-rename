version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      test-tooling:
        patterns:
          - vitest
          - '@vitest/*'
          - '@playwright/*'
          - '@testing-library/*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
