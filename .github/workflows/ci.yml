name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Type check
        working-directory: web
        run: npx tsc --noEmit
      - name: Tests
        working-directory: web
        run: npm test
      - name: Build
        working-directory: web
        run: npm run build
